document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"c022ba85-4ea5-4d81-97eb-7708a9acadda\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"d2dd672b-3369-457f-8e51-1cd802ccc7c1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n/* ============================================================\n   ТРИ А — Motion Design System\n   Принципы: линии строятся (не проявляются); движение фиксируется,\n   не пружинит; сначала чертится каркас, затем в него встаёт контент;\n   жёсткая регистрация вместо мягкого оседания; постоянного движения\n   почти нет — только честные часы и живые статус-точки.\n   ============================================================ */\n@font-face{font-family:'TT Autonomous';src:url(\"4b5699fe-5936-429a-8bb9-f28816724b23\") format('truetype');font-weight:100 900;font-display:swap;}\n:root{\n  --e-draft:cubic-bezier(.22,1,.36,1);\n  --e-snap:cubic-bezier(.3,0,0,1);\n  --e-guide:cubic-bezier(.65,0,.35,1);\n  --d-micro:.16s; --d-el:.42s; --d-orch:.72s; --stag:90ms;\n  --bg:#001C39; --surface:rgba(255,255,255,.05); --ink:#FCF9E8;\n  --muted:rgba(252,249,232,.55); --faint:rgba(252,249,232,.35); --border:rgba(252,249,232,.12);\n  --nav-bg:rgba(0,28,57,.88);\n  --surface-card:#082742;\n  --surface-hover:#0D2E4A;\n  --dir-num:rgba(252,249,232,.05);\n  --line-color:rgba(252,249,232,.15);\n}\n[data-dark=\"false\"]{\n  --bg:#F6F8FC; --surface:#FFFFFF; --ink:#14213A;\n  --muted:#5D6B82; --faint:#93A3BB; --border:rgba(20,33,58,.1);\n  --nav-bg:rgba(246,248,252,.85);\n  --surface-card:#FFFFFF;\n  --surface-hover:#EEF3FA;\n  --dir-num:rgba(20,33,58,.05);\n  --line-color:rgba(20,33,58,.15);\n}\n[data-dark=\"true\"]{\n  --bg:#001C39; --surface:rgba(255,255,255,.05); --ink:#FCF9E8;\n  --muted:rgba(252,249,232,.55); --faint:rgba(252,249,232,.35); --border:rgba(252,249,232,.12);\n  --nav-bg:rgba(0,28,57,.88);\n  --surface-card:#082742;\n  --surface-hover:#0D2E4A;\n  --dir-num:rgba(252,249,232,.05);\n  --line-color:rgba(252,249,232,.15);\n}\nhtml,body{margin:0;padding:0;background:var(--bg);transition:background .4s ease;}\n\n/* ── dark mode overrides ── */\n[data-dark=\"true\"] section,\n[data-dark=\"true\"] footer { background-color:var(--bg) !important; }\n[data-dark=\"true\"] h2,[data-dark=\"true\"] h3 { color:var(--ink) !important; }\n[data-dark=\"true\"] .proc-card { background:rgba(255,255,255,.05) !important; border-color:rgba(252,249,232,.1) !important; }\n[data-dark=\"true\"] .diag-card { background:rgba(255,255,255,.04) !important; border-color:rgba(252,249,232,.1) !important; }\n[data-dark=\"true\"] .case-card { background:rgba(255,255,255,.04) !important; border-color:rgba(252,249,232,.1) !important; }\n[data-dark=\"true\"] .prin-card { background:rgba(255,255,255,.04) !important; }\n[data-dark=\"true\"] .principles-grid { background:rgba(252,249,232,.08) !important; border-color:rgba(252,249,232,.08) !important; }\n[data-dark=\"true\"] .f-input { background:rgba(255,255,255,.05) !important; border-color:rgba(252,249,232,.15) !important; color:var(--ink) !important; }\n[data-dark=\"true\"] .form-card { background:rgba(255,255,255,.04) !important; border-color:rgba(252,249,232,.1) !important; }\n*{box-sizing:border-box;}\n::selection{background:#14213A;color:#F6F8FC;}\n\n/* ---------- keyframes ---------- */\n@keyframes kf-draw{to{stroke-dashoffset:0;}}\n@keyframes kf-fade{from{opacity:0;}to{opacity:1;}}\n@keyframes kf-rise{from{transform:translateY(110%);}to{transform:translateY(0);}}\n@keyframes kf-rise-soft{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}\n@keyframes kf-wipe-x{from{clip-path:inset(0 100% 0 0);}to{clip-path:inset(0 0 0 0);}}\n@keyframes kf-card-in{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}\n@keyframes kf-guide-recede{to{opacity:.14;}}\n@keyframes kf-trace-out{to{opacity:0;}}\n@keyframes kf-dot{0%,70%{opacity:.9;}71%,100%{opacity:.18;}}                 /* пульс статус-точки — единственный разрешённый цикл */\n@keyframes kf-snap-in{from{opacity:0;transform:translate(var(--sx,6px),var(--sy,-6px));}to{opacity:1;transform:translate(0,0);}}\n\n/* ---------- система раскрытия по скроллу ---------- */\n.rv{opacity:0;transform:translateY(12px);transition:opacity var(--d-el) var(--e-draft),transform var(--d-orch) var(--e-draft);}\n.rv.in{opacity:1;transform:none;}\n.rv-w{opacity:0;clip-path:inset(0 100% 0 0);transition:opacity var(--d-el) var(--e-draft),clip-path var(--d-orch) var(--e-draft);}\n.rv-w.in{opacity:1;clip-path:inset(0 0 0 0);}\n/* раскрытие заголовка строкой-маской */\n.rl{display:block;overflow:hidden;padding-bottom:.09em;}\n.rli{display:block;transform:translateY(112%);}\n.in .rli,.rli.in{transform:translateY(0);transition:transform var(--d-orch) var(--e-draft);}\n.line-rule{transform-origin:left;transform:scaleX(0);transition:transform var(--d-orch) var(--e-draft);}\n.in .line-rule{transform:scaleX(1);}\n\n/* ---------- HERO: построение чертежа (однократно на маунте) ---------- */\n.hero-grid{opacity:0;animation:kf-fade .9s var(--e-draft) .05s forwards;}\n.logo-stage{position:relative;display:block;width:fit-content;}\n.logo-ink{clip-path:inset(0 100% 0 0);animation:kf-wipe-x var(--d-orch) var(--e-draft) .74s forwards;}\n.logo-trace{animation:kf-trace-out .5s var(--e-draft) 1.18s forwards;}\n.logo-trace .lt{stroke-dasharray:1;stroke-dashoffset:1;animation:kf-draw .82s var(--e-draft) forwards;}\n.logo-trace .lt:nth-child(1){animation-delay:.24s;}\n.logo-trace .lt:nth-child(2){animation-delay:.42s;}\n.logo-trace .lt:nth-child(3){animation-delay:.60s;}\n.logo-guides{opacity:.5;animation:kf-guide-recede 1s var(--e-draft) 1s forwards;}\n.logo-guides .lg{stroke-dasharray:1;stroke-dashoffset:1;animation:kf-draw .6s var(--e-draft) forwards;}\n.logo-guides .lg:nth-child(1){animation-delay:.14s;}\n.logo-guides .lg:nth-child(2){animation-delay:.22s;}\n.logo-guides .lg:nth-child(3){animation-delay:.30s;}\n.logo-guides .lg:nth-child(4){animation-delay:.38s;}\n.logo-guides .lg:nth-child(5){animation-delay:.46s;}\n.logo-guides .lg:nth-child(6){animation-delay:.50s;}\n.hero-eyebrow{opacity:0;animation:kf-rise-soft .55s var(--e-draft) .12s forwards;}\n.hero-h1 .rli{transform:translateY(112%);animation:kf-rise var(--d-orch) var(--e-draft) forwards;}\n.hero-h1 .rl:nth-of-type(1) .rli{animation-delay:.28s;}\n.hero-h1 .rl:nth-of-type(2) .rli{animation-delay:.38s;}\n.hero-h1 .rl:nth-of-type(3) .rli{animation-delay:.48s;}\n.hero-sub{opacity:0;animation:kf-rise-soft .55s var(--e-draft) .52s forwards;}\n.hero-readout{opacity:0;animation:kf-fade .6s var(--e-draft) .7s forwards;}\n.hero-readout .brk{stroke-dasharray:1;stroke-dashoffset:1;animation:kf-draw .5s var(--e-snap) .7s forwards;}\n.hero-hint{opacity:0;animation:kf-fade .7s var(--e-draft) .86s forwards;}\n.dir-card{opacity:0;animation:kf-card-in .62s var(--e-draft) both;}\n.dir-card:nth-child(1){animation-delay:.74s;}\n.dir-card:nth-child(2){animation-delay:.83s;}\n.dir-card:nth-child(3){animation-delay:.92s;}\n\n/* живая точка-статус */\n.dot-live{animation:kf-dot 2.8s var(--e-guide) infinite;}\n\n/* ---------- НАВИГАЦИЯ + микровзаимодействия ---------- */\n.lnk-home .lh-mark{transition:transform var(--d-micro) var(--e-snap);}\n.lnk-home:hover .lh-mark{transform:translateX(2px);}\n.navlnk{position:relative;transition:color var(--d-el) var(--e-draft),letter-spacing var(--d-el) var(--e-draft);}\n.navlnk:hover{color:var(--ink);letter-spacing:.012em;}\n.navlnk .ul{position:absolute;left:0;bottom:-2px;width:100%;height:1px;background:var(--ink);transform:scaleX(0);transform-origin:left;transition:transform var(--d-micro) var(--e-snap);}\n.navlnk:hover .ul{transform:scaleX(1);}\n.navlnk .uc{position:absolute;left:-5px;bottom:-3px;width:2px;height:3px;background:#FCF9E8;opacity:0;transition:opacity var(--d-micro) var(--e-snap);}\n.navlnk:hover .uc{opacity:1;}\n.btn-cta{position:relative;overflow:hidden;transition:color var(--d-el) var(--e-draft),border-color var(--d-el) var(--e-draft),letter-spacing var(--d-el) var(--e-draft);}\n.btn-cta>span{position:relative;z-index:2;transition:color var(--d-el) var(--e-draft);}\n.btn-cta::before{content:\"\";position:absolute;inset:0;background:var(--accent,#2E58D6);clip-path:inset(0 100% 0 0);transition:clip-path var(--d-el) var(--e-draft);z-index:1;}\n.btn-cta:hover{color:#FFFFFF;border-color:var(--accent,#2E58D6);letter-spacing:.018em;}\n.btn-cta:hover>span{color:#FFFFFF;}\n.btn-cta:hover::before{clip-path:inset(0 0 0 0);}\n.arw{display:inline-block;transition:transform var(--d-micro) var(--e-snap);}\n.has-arw:hover .arw{transform:translateX(4px);}\n\n/* ---------- КАРТОЧКИ НАПРАВЛЕНИЙ (фокус-инструмент) ---------- */\n.dir-card .dir-frame{position:absolute;inset:0;border:1px solid var(--accent,#2E58D6);border-radius:3px;opacity:var(--dir-a,0);transition:opacity var(--d-el) var(--e-draft);pointer-events:none;}\n.dir-card .dir-bar{position:absolute;left:0;top:0;height:2px;width:100%;background:var(--accent,#2E58D6);transform-origin:left;transform:scaleX(var(--dir-a,0));transition:transform var(--d-orch) var(--e-draft);}\n\n/* ---------- ПРОЦЕСС: схема чертится по скроллу ---------- */\n#process{--p:0;}\n.proc-rail{position:absolute;left:6%;right:6%;top:18px;height:1px;background:linear-gradient(90deg,transparent,rgba(20,33,58,.18) 8%,rgba(20,33,58,.18) 92%,transparent);}\n.proc-fill{position:absolute;left:6%;top:18px;width:88%;height:1px;background:var(--accent,#2E58D6);transform-origin:left;transform:scaleX(var(--p));}\n.proc-head{position:absolute;top:16px;left:calc(6% + 88% * var(--p));width:5px;height:5px;border-radius:50%;background:var(--accent,#2E58D6);box-shadow:0 0 10px var(--accent,#2E58D6);transform:translateX(-50%);opacity:calc(var(--p) * 4);}\n.proc-step{opacity:calc((var(--p) - var(--t)) * 5);transform:translateY(clamp(0px, calc((var(--t) - var(--p)) * 46px), 12px));}\n.proc-node{transition:border-color var(--d-el) var(--e-draft),box-shadow var(--d-el) var(--e-draft),color var(--d-el) var(--e-draft);}\n.proc-step:hover .proc-node{border-color:var(--accent,#2E58D6);box-shadow:0 0 0 5px rgba(20,33,58,.05);color:#14213A;}\n.proc-card{transition:transform var(--d-el) var(--e-draft),border-color var(--d-el) var(--e-draft),background var(--d-el) var(--e-draft);}\n.proc-step:hover .proc-card{transform:translateY(-5px);border-color:rgba(20,33,58,.20);background:#EEF3FA;}\n.proc-card .pc-tick{position:absolute;left:0;top:0;width:2px;height:100%;background:var(--accent,#2E58D6);transform-origin:top;transform:scaleY(0);transition:transform var(--d-el) var(--e-snap);}\n.proc-step:hover .proc-card .pc-tick{transform:scaleY(1);}\n\n/* ---------- ДИАГНОСТИКА: «когда к нам обращаются» ---------- */\n.diag-card{position:relative;background:var(--surface-card);cursor:pointer;overflow:hidden;transition:background var(--d-el) var(--e-draft);}\n.diag-card:hover{background:#0D2E4A;}\n.diag-card .diag-frame{position:absolute;inset:0;border:1px solid var(--accent,#2E58D6);opacity:var(--diag-a,0);transition:opacity var(--d-el) var(--e-draft);pointer-events:none;}\n.diag-card .diag-cross circle,.diag-card .diag-cross line{stroke-dasharray:1;stroke-dashoffset:1;transition:stroke-dashoffset var(--d-orch) var(--e-draft);}\n.diag-card:hover .diag-cross circle,.diag-card:hover .diag-cross line{stroke-dashoffset:0;}\n/* угловые скобки-аннотация (redline) вст   const el = document.querySelector('[data-clock]');\n    if (el) el.textContent = `${p(m.getHours())}:${p(m.getMinutes())}:${p(m.getSeconds())}`;\n  }\n  setupObservers() {\n    const reduce = this.reduce;\n    if (this.io) this.io.disconnect();\n    // раскрытие: каркас чертится, контент встаёт в него — со ступенчатой задержкой\n    this.io = new IntersectionObserver((es) => {\n      es.forEach((e) => {\n        if (e.isIntersecting) {\n          const el = e.target;\n          const delay = reduce ? 0 : parseFloat(el.getAttribute('data-delay') || 0);\n          setTimeout(() => { el.classList.add('in'); }, delay);\n          this.io.unobserve(el);\n        }\n      });\n    }, { threshold: 0, rootMargin: '0px 0px 0px 0px' });\n    document.querySelectorAll('[data-reveal]').forEach((el) => {\n      if (!el.classList.contains('in')) {\n        const r = el.getBoundingClientRect();\n        if (r.top < window.innerHeight) {\n          const delay = reduce ? 0 : parseFloat(el.getAttribute('data-delay') || 0);\n          setTimeout(() => el.classList.add('in'), delay);\n        } else {\n          this.io.observe(el);\n        }\n      }\n    });\n\n\n\n    // спай навигации — подсветка активного раздела\n    if (this.spy) this.spy.disconnect();\n    const links = [...document.querySelectorAll('[data-spy]')];\n    this.spy = new IntersectionObserver((es) => {\n      es.forEach((e) => {\n        if (e.isIntersecting) {\n          this.setState({ activeSection: e.target.id });\n        }\n      });\n    }, { threshold: 0.45 });\n    document.querySelectorAll('section[id]').forEach((s) => this.spy.observe(s));\n  }\n  setupProcess() {\n    const proc = document.getElementById('process');\n    if (!proc || this._procBound === proc) return;\n    this._procBound = proc;\n    if (this.reduce) { proc.style.setProperty('--p', '1'); return; }\n    // схема процесса чертится по мере прокрутки: одна запись CSS-переменной за кадр\n    const update = () => {\n      this._raf = null
